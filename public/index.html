<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MZK Opole - Mapa pojazdów na żywo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="sidebar-rail">
    <div class="rail-logo">🚌 MZK Opole</div>
    <button class="rail-btn active" data-panel="trip">📍 Planuj podróż</button>
    <button class="rail-btn" data-panel="lines">🚌 Linie</button>
    <button class="rail-btn disabled">⭐ Ulubione <span class="rail-soon">wkrótce</span></button>
    <button class="rail-btn" data-panel="stats">📊 Statystyki</button>
    <button class="rail-btn" data-panel="tickets">🎫 Bilety</button>
    <button class="rail-btn" data-panel="help">❓ Pomoc</button>
    <button class="rail-btn" data-panel="info">ℹ️ Informacje</button>
    <div class="rail-spacer"></div>
    <button class="rail-icon-btn" id="theme-toggle" title="Tryb ciemny/jasny">🌙</button>
</div>

<div id="sidebar-panel">
    <div class="panel-content active" data-panel="trip">
        <div class="panel-header">
            <h2>📍 Planuj podróż</h2>
            <button class="panel-close" data-close>✕</button>
        </div>
        <div class="panel-body">
            <button id="geo-btn" class="geo-button">📍 Z mojej lokalizacji</button>
            <div class="trip-input-group">
                <label>Z:</label>
                <div class="trip-input-wrapper">
                    <input type="text" id="trip-from-input" placeholder="Wybierz przystanek..." />
                    <button class="trip-pick-btn" id="trip-from-pick" title="Wybierz na mapie">🎯</button>
                    <button class="trip-clear-btn" id="trip-from-clear" title="Wyczyść">✕</button>
                </div>
                <div id="trip-from-suggestions" class="suggestions-dropdown"></div>
            </div>
            <div class="trip-input-group">
                <label>Do:</label>
                <div class="trip-input-wrapper">
                    <input type="text" id="trip-to-input" placeholder="Wybierz przystanek..." />
                    <button class="trip-pick-btn" id="trip-to-pick" title="Wybierz na mapie">🎯</button>
                    <button class="trip-clear-btn" id="trip-to-clear" title="Wyczyść">✕</button>
                </div>
                <div id="trip-to-suggestions" class="suggestions-dropdown"></div>
            </div>
            <button id="trip-search" class="trip-search-btn">🔍 Szukaj połączeń</button>
            <div id="trip-results"></div>
        </div>
    </div>

    <div class="panel-content" data-panel="lines">
        <div class="panel-header">
            <h2>🚌 Linie</h2>
            <button class="panel-close" data-close>✕</button>
        </div>
        <div class="panel-body">
            <div id="counter-detail" class="counter-detail">Ładowanie...</div>
            <input type="text" id="search" placeholder="🔍 Szukaj linii (np. 5, N1)..." />
            <div class="filter-toggles">
                <label><input type="checkbox" id="filter-day" checked> Dzienne</label>
                <label><input type="checkbox" id="filter-night" checked> Nocne</label>
            </div>
            <div class="lines-divider">Wszystkie linie aktywne:</div>
            <div id="lines-list"></div>
        </div>
    </div>

    <div class="panel-content" data-panel="stats">
        <div class="panel-header">
            <h2>📊 Statystyki</h2>
            <button class="panel-close" data-close>✕</button>
        </div>
        <div class="panel-body">
            <div id="stats-content" class="stats-loading">⏳ Ładowanie...</div>
        </div>
    </div>

    <div class="panel-content" data-panel="tickets">
        <div class="panel-header">
            <h2>🎫 Bilety</h2>
            <button class="panel-close" data-close>✕</button>
        </div>
        <div class="panel-body" id="tickets-body"></div>
    </div>

    <div class="panel-content" data-panel="help">
        <div class="panel-header">
            <h2>❓ Pomoc</h2>
            <button class="panel-close" data-close>✕</button>
        </div>
        <div class="panel-body" id="help-body"></div>
    </div>

    <div class="panel-content" data-panel="info">
        <div class="panel-header">
            <h2>ℹ️ Informacje</h2>
            <button class="panel-close" data-close>✕</button>
        </div>
        <div class="panel-body" id="info-body"></div>
    </div>
</div>

<div id="map"></div>

<div id="filter-notice" class="filter-notice">
    <span id="filter-notice-text"></span>
    <button id="filter-notice-clear">✕ Wyczyść</button>
</div>

<div id="trip-notice-from" class="filter-notice trip-notice from">
    <span class="trip-notice-icon">🟢</span>
    <span id="trip-notice-from-text"></span>
    <button class="trip-notice-clear" data-clear="from">✕ Anuluj</button>
</div>

<div id="trip-notice-to" class="filter-notice trip-notice to">
    <span class="trip-notice-icon">🎯</span>
    <span>Wybieranie celu podróży...</span>
    <button class="trip-notice-clear" data-clear="to">✕ Anuluj</button>
</div>

<div id="trip-notice-plan" class="filter-notice trip-notice plan">
    <span class="trip-notice-icon">🗺️</span>
    <span id="trip-notice-plan-text"></span>
    <button class="trip-notice-clear" data-clear="plan">✕ Anuluj</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
